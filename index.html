<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>

    <p>
      Rock Paper Scissors
    </p>

    <button onclick="
    playGame('rock');">
      Rock
    </button>

    <button onclick="
    playGame('paper');">
      Paper
    </button>

    <button onclick="
    playGame('scissors');">
      Scissors
    </button>

    <button onclick="
    scores.wins = 0;
    scores.losses = 0;
    scores.ties = 0;
    localStorage.removeItem('scores');
    ">
      Reset Score
    </button>



    <script>
      // populate scores from local storage
      let scores = JSON.parse(localStorage.getItem('scores')) || 
        {
          wins: 0,
          losses: 0, 
          ties: 0
        }
        
      function getComputerMove()
      {
        const randNum = Math.random();

        // rock
        if (randNum >= 0 && randNum < 1/3)
          return 'rock';

        // paper
        else if (randNum >= 1/3 && randNum < 2/3)
          return 'paper';

        // scissors
        else if (randNum >= 2/3 && randNum <= 1)
          return 'scissors';
      }

      function playGame(playerMove)
      {
        const computerMove = getComputerMove();
        let result = '';

        // different cases depending on user's move
        switch (playerMove)
        {
          case 'rock':
          {

            // different cases depending on computer's move
            switch (computerMove)
            {
              case 'rock':
              {
                result = 'Tie.';
                break;
              }

              case 'paper':
              {
                result = 'You lose.';
                break;
              }

              case 'scissors':
              {
                result = 'You win.';
                break;
              }
            }
            break;
          }

          case 'paper':
          {
            // different cases depending on computer's move
            switch (computerMove)
            {
              case 'rock':
              {
                result = 'You win.';
                break;
              }

              case 'paper':
              {
                result = 'Tie.';
                break;
              }

              case 'scissors':
              {
                result = 'You lose.';
                break;
              }
            }
            break;
          }

          case 'scissors':
          {
            // different cases depending on computer's move
            switch (computerMove)
            {
              case 'rock':
              {
                result = 'You lose.';
                break;
              }

              case 'paper':
              {
                result = 'You win.';
                break;
              }

              case 'scissors':
              {
                result = 'Tie.';
                break;
              }
            }
            break;
          }
        }


        // update the score
        if (result === 'You win.')
        {
          scores.wins++;
        }
        else if (result === 'You lose.')
        {
          scores.losses++;
        }
        else if (result ==='Tie.')
        {
          scores.ties++;
        }

        
        localStorage.setItem('scores', JSON.stringify(scores));

        // display the result to the player
        alert('You picked ' + playerMove + '. Computer picked ' + computerMove + '. ' + result
          + '\nWins: ' + scores.wins + '. Losses: ' + scores.losses + '. Ties: ' + scores.ties);
      }


    </script>
  </body>
</html>
