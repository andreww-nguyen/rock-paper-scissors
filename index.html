<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>

    <p>
      Rock Paper Scissors
    </p>

    <button onclick="
    playGame('rock');">
      Rock
    </button>

    <button onclick="
    playGame('paper');">
      Paper
    </button>

    <button onclick="
    playGame('scissors');">
      Scissors
    </button>



    <script>
      function getComputerMove()
      {
        const randNum = Math.random();

        // rock
        if (randNum >= 0 && randNum < 1/3)
          return 'rock';

        // paper
        else if (randNum >= 1/3 && randNum < 2/3)
          return 'paper';

        // scissors
        else if (randNum >= 2/3 && randNum <= 1)
          return 'scissors';
      }

      function playGame(playerMove)
      {
        const computerMove = getComputerMove();
        let result = '';

        // different cases depending on user's move
        switch (playerMove)
        {
          case 'rock':
          {

            // different cases depending on computer's move
            switch (computerMove)
            {
              case 'rock':
              {
                result = 'Tie.';
                break;
              }

              case 'paper':
              {
                result = 'You lose';
                break;
              }

              case 'scissors':
              {
                result = 'You win';
                break;
              }
            }
            break;
          }

          case 'paper':
          {
            // different cases depending on computer's move
            switch (computerMove)
            {
              case 'rock':
              {
                result = 'You win.';
                break;
              }

              case 'paper':
              {
                result = 'Tie';
                break;
              }

              case 'scissors':
              {
                result = 'You lose';
                break;
              }
            }
            break;
          }

          case 'scissors':
          {
            // different cases depending on computer's move
            switch (computerMove)
            {
              case 'rock':
              {
                result = 'You lose.';
                break;
              }

              case 'paper':
              {
                result = 'You win';
                break;
              }

              case 'scissors':
              {
                result = 'Tie';
                break;
              }
            }
            break;
          }
        }

        // display the result to the player
        alert('You picked ' + playerMove + '. Computer picked ' + computerMove + '. ' + result);
      }

    </script>
  </body>
</html>
